<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo-area" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
            <div class="logo-icon" style="width: 20px; height: 20px; background-color: coral;"></div>
            <div class="logo-name">
                <h1>Fazer</h1>
            </div>
        </div>
    </header>
    <main>
        <dialog id="new-task-dialog" class="new-task-dialog">
            <div class="name-section">
                <label for="new-task-name">Name:</label>
                <input type="text" class="new-task-name" id="new-task-name">
            </div>
            <div class="priority-section">
                <label for="new-task-priority">Priority:</label>
                <select name="" id="new-task-priority">
                    <option value="" disabled selected>...</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                    <option value="None">None</option>
                </select>
            </div>
            <button type="submit" command="close" commandFor="new-task-dialog" id="new-task-add-btn">Add task</button>
        </dialog>
        <dialog id="task-update-dialog" class="task-update-dialog">
            <h3>Update the task</h3>
            <div class="name-section">
                <label for="update-task-name">Name:</label>
                <input type="text" class="update-task-name" id="update-task-name">
            </div>
            <div class="priority-section">
                <label for="update-task-priority">Priority:</label>
                <select name="" id="update-task-priority">
                    <option value="" disabled selected>...</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                    <option value="None">None</option>
                </select>
            </div>
            <button type="submit" command="close" commandFor="task-update-dialog" id="update-task-btn">Update task</button>
        </dialog>
        <div class="search-area">
            <div>
                <input type="search" name="search-box" id="search-box" class="search-box">
                <button class="add-task-btn" commandFor="new-task-dialog" command="show-modal">Add Task</button> 
            </div>
            <div>
                <select name="status-filter" id="status-filter">
                    <option value="all" selected>All</option>
                    <option value="completed">Completed</option>
                    <option value="unchecked">Unchecked</option>
                </select>
                <select name="priority-filter" id="priority-filter">
                    <option value="all" selected>All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="none">None</option>
                </select>
            </div>
        <div class="tasks-area" id="tasks-area"></div>
    </main>
</body>
<script src="script.js"></script>

</html>
